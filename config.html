<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NGƯỜI BỊ CÁ CHƠI - CONFIG NETWORK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            padding: 20px 0;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.03) 2px, transparent 2px),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.04) 1.5px, transparent 1.5px);
            background-size: 100px 100px;
            animation: ambientWaves 20s linear infinite;
            z-index: 0;
        }

        @keyframes ambientWaves {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 0 -100px;
            }
        }

        .back-nav {
            width: 90%;
            max-width: 340px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            z-index: 1;
            box-sizing: border-box;
        }

        .btn-back {
            background: rgba(0, 0, 0, 0.4);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }

        .btn-back:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .container {
            width: 90%;
            max-width: 340px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 25px 22px;
            border-radius: 26px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            z-index: 1;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #00f2fe;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            color: #b0c4de;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
            outline: none;
        }

        input:focus {
            border-color: #00f2fe;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5), 0 0 8px rgba(0, 242, 254, 0.3);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 30px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #8a9ba8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: #00f2fe;
        }

        .toggle-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4), inset 0 -4px 0px rgba(0, 0, 0, 0.2), inset 0 2px 0px rgba(255, 255, 255, 0.3);
            transition: all 0.1s ease;
            font-family: 'Inter', sans-serif;
        }

        button[type="submit"]:disabled {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 10px;
            margin-top: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- Aquarium Animation --- */
        .aquarium-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .fish {
            position: absolute;
            font-size: 24px;
            user-select: none;
            opacity: 0.6;
        }

        .fish-left {
            left: -50px;
            transform: scaleX(-1);
            animation: swimRight linear infinite;
        }

        .fish-right {
            right: -50px;
            animation: swimLeft linear infinite;
        }

        @keyframes swimRight {
            0% {
                left: -50px;
                margin-top: 0px;
            }
            50% {
                margin-top: 20px;
            }
            100% {
                left: 105%;
                margin-top: 0px;
            }
        }

        @keyframes swimLeft {
            0% {
                right: -50px;
                margin-top: 0px;
            }
            50% {
                margin-top: -30px;
            }
            100% {
                right: 105%;
                margin-top: 0px;
            }
        }

        .fish1 {
            top: 15%;
            font-size: 28px;
            animation-duration: 14s;
        }

        .fish2 {
            top: 35%;
            font-size: 20px;
            animation-duration: 18s;
            animation-delay: 3s;
        }

        .fish3 {
            top: 65%;
            font-size: 32px;
            animation-duration: 22s;
        }

        .fish4 {
            top: 80%;
            font-size: 22px;
            animation-duration: 16s;
            animation-delay: 5s;
        }

        .fish5 {
            top: 45%;
            font-size: 25px;
            animation-duration: 12s;
            animation-delay: 7s;
        }

        /* --- Status Glass Overlay --- */
        .status-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        .status-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .status-box {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        .status-overlay.show .status-box {
            transform: scale(1);
        }

        .status-title {
            font-size: 15px;
            font-weight: 700;
            color: #00f2fe;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-desc {
            font-size: 13px;
            color: #e2e8f0;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .modal-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #fff;
            display: none;
        }
    </style>
</head>

<body>
    <div id="status-modal" class="status-overlay">
        <div class="status-box">
            <div id="modal-title" class="status-title">ĐANG LƯU...</div>
            <div id="status-desc" class="status-desc">Hệ thống đang tiếp nhận thông số cấu hình mạng.</div>
            <button id="modal-ok-btn" class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <div class="aquarium-background">
        <div class="fish fish-left fish1">🐠</div>
        <div class="fish fish-left fish3">🐟</div>
        <div class="fish fish-left fish5">🐡</div>
        <div class="fish fish-right fish2">🐟</div>
        <div class="fish fish-right fish4">🐠</div>
    </div>

    <div class="back-nav"><a href="index.html" class="btn-back">⟵ QUAY LẠI</a></div>

    <div class="container">
        <h2>CẤU HÌNH WIFI</h2>
        <form id="wifi-form" onsubmit="submitConfig(event)">
            <div class="form-group">
                <label>WiFi SSID</label>
                <input name="ssid" id="ssid" placeholder="Nhập tên WiFi..." required minlength="1">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pass" name="pass" placeholder="Nhập mật khẩu..." required minlength="8">
                <button type="button" class="toggle-btn" onclick="toggleVisibility('pass')">
                    <svg id="pass-icon" viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label>Blynk Token</label>
                <input type="password" id="token" name="token" placeholder="Dán Blynk Token vào đây..." required minlength="10">
                <button type="button" class="toggle-btn" onclick="toggleVisibility('token')">
                    <svg id="token-icon" viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                    </svg>
                </button>
            </div>
            <button type="submit" id="submit-btn">SAVE ĐI TÌNH YÊU...</button>
        </form>
        <div class="footer">Phát Triển Bởi: Quá Khứ Của BLK CS5</div>
    </div>

    <script>
        function toggleVisibility(id) {
            const field = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (field.type === "password") {
                field.type = "text";
                icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.39 2.59-3.26 3.14-5.34-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16c.56-.23 1.17-.36 1.82-.36zm-8.14-1.93L2.43 6.5l2.22 2.22C3.12 10.05 2.01 11.89 1.46 14c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l3.12 3.12 1.41-1.41L3.86 5.07zm7.57 7.57c-.24-.62-.74-1.12-1.36-1.36l2.72 2.72-1.36-1.36zM12 16.5c-2.49 0-4.5-2.01-4.5-4.5 0-.65.14-1.26.38-1.81l6.11 6.11c-.55.24-1.16.38-1.99.38z"/>';
            } else {
                field.type = "password";
                icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            }
        }

        function closeModal() {
            const modal = document.getElementById('status-modal');
            const btn = document.getElementById('submit-btn');
            const okBtn = document.getElementById('modal-ok-btn');
            if (modal) modal.classList.remove('show');
            if (btn) btn.disabled = false;
            if (okBtn) okBtn.style.display = "none";
        }

        function submitConfig(event) {
            event.preventDefault();

            // Khai báo lấy phần tử HTML
            const btn = document.getElementById('submit-btn');
            const modal = document.getElementById('status-modal');
            const mTitle = document.getElementById('modal-title');
            const mDesc = document.getElementById('status-desc'); // Đã sửa ID lỗi ở đây
            const okBtn = document.getElementById('modal-ok-btn');

            const ssid = document.getElementById('ssid').value;
            const pass = document.getElementById('pass').value;
            const token = document.getElementById('token').value;

            // Khóa nút bấm, ẩn nút OK tạm thời
            if (btn) btn.disabled = true;
            if (okBtn) okBtn.style.display = "none";

            // Xử lý đổi chữ an toàn (Chỉ đổi khi đối tượng khác null)
            if (mTitle) mTitle.innerText = "ĐANG LƯU DỮ LIỆU...";
            if (mDesc) mDesc.innerText = "Đang gửi thông tin kết nối sang vi điều khiển ESP...";
            if (modal) modal.classList.add('show');

            // Đường dẫn tuyệt đối trỏ trực tiếp sang IP của ESP32 AP Hotspot
            const url = `http://192.168.4.1/save?ssid=${encodeURIComponent(ssid)}&pass=${encodeURIComponent(pass)}&token=${encodeURIComponent(token)}`;

            fetch(url, {
                method: 'GET',
                mode: 'cors' // Bắt buộc mở cors cho kết nối App độc lập
            })
                .then(res => {
                    if (res.ok) {
                        if (mTitle) mTitle.innerText = "LƯU THÀNH CÔNG!";
                        if (mDesc) mDesc.innerText = "Bo mạch đang tiến hành khởi động lại và kết nối vào mạng WiFi mới. Hãy kết nối lại WiFi nhà để bắt đầu sử dụng App!";
                        if (okBtn) okBtn.style.display = "block";
                        localStorage.setItem("LOCAL_USER_TOKEN", token); // Lưu token cho Dashboard
                    } else {
                        throw new Error("ESP_Error");
                    }
                })
                .catch(() => {
                    if (mTitle) mTitle.innerText = "GỬI THẤT BẠI!";
                    if (mDesc) mDesc.innerText = "Không thể kết nối đến bo mạch. Hãy chắc chắn điện thoại vẫn đang bắt mạng WiFi do ESP phát ra và NHỚ TẮT 4G/5G.";
                    if (okBtn) okBtn.style.display = "block";
                });
        }
    </script>
</body>
</html>
